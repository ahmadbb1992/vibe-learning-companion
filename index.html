<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Learning Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎵 Vibe Learning Companion</h1>
    <p class="subtitle">Habit Tracker · Pomodoro · Quick Notes</p>
  </header>

  <main class="dashboard">

    <!-- ===== HABIT TRACKER PANEL ===== -->
    <section class="panel habit-panel">
      <h2>📋 Habit Tracker</h2>

      <!-- Form Tambah Habit -->
      <form id="habit-form" class="habit-form">
        <input
          type="text"
          id="habit-input"
          placeholder="Tambah kebiasaan baru..."
          maxlength="50"
          required
        >
        <button type="submit" class="btn btn-add">+ Tambah</button>
      </form>

      <!-- Progress Summary -->
      <div id="habit-progress" class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
        <span class="progress-text" id="progress-text">0 dari 0 selesai</span>
      </div>

      <!-- Daftar Habit -->
      <ul id="habit-list" class="habit-list">
        <!-- Diisi oleh JavaScript -->
      </ul>

      <p id="empty-message" class="empty-msg">Belum ada kebiasaan. Tambahkan satu! 👆</p>
    </section>

    <!-- ===== POMODORO PANEL (placeholder) ===== -->
    <section class="panel pomodoro-panel">
      <h2>⏱️ Pomodoro Timer</h2>
      <div class="pomodoro-display" id="pomodoro-display">25:00</div>
      <div class="pomodoro-controls">
        <button id="pomodoro-start" class="btn btn-add">Start</button>
        <button id="pomodoro-pause" class="btn">Pause</button>
        <button id="pomodoro-reset" class="btn btn-delete">Reset</button>
      </div>
    </section>

    <!-- ===== TELEGRAM PANEL (placeholder) ===== -->
    <section class="panel telegram-panel">
      <h2>💬 Quick Notes</h2>
      <div class="telegram-card">
        <div class="field-group">
          <label for="telegram-token">Telegram Bot Token</label>
          <input id="telegram-token" class="input-field" type="text" placeholder="123456789:ABCdefGhIJKlmnOPqrsTUVwxyz" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="telegram-chat-id">Chat ID</label>
          <input id="telegram-chat-id" class="input-field" type="text" placeholder="987654321" autocomplete="off">
        </div>
        <div class="telegram-actions">
          <button id="save-telegram-config" class="btn btn-add">Save Config</button>
          <button id="clear-telegram-config" class="btn btn-delete">Clear</button>
        </div>
        <div class="field-group">
          <label for="telegram-message">Catatan Cepat</label>
          <textarea id="telegram-message" class="input-field textarea-field" placeholder="Tulis ide atau progress singkat..."></textarea>
        </div>
        <div class="telegram-actions">
          <button id="send-telegram-message" class="btn btn-add">Send to Telegram</button>
          <button id="send-telegram-report" class="btn">Send Daily Report</button>
        </div>
        <div id="telegram-status" class="telegram-status">Config belum disimpan.</div>
      </div>
    </section>

  </main>

  <footer>
    <p>Dibuat dengan ❤️ dan Vibe Coding · 2026</p>
  </footer>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
