<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Vibe Learning Companion - Test Runner</title>
  <style>
    body {
      background-color: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { border-bottom: 2px solid #2e3347; padding-bottom: 0.5rem; }
    .test-suite { margin-top: 1.5rem; background: #1a1d27; border: 1px solid #2e3347; border-radius: 8px; padding: 1.5rem; }
    .test-case { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #2e3347; }
    .test-case:last-child { border-bottom: none; }
    .pass { color: #22c55e; font-weight: bold; }
    .fail { color: #ef4444; font-weight: bold; }
    .summary { margin-top: 1.5rem; font-size: 1.1rem; font-weight: bold; padding: 1rem; border-radius: 8px; }
    .summary.all-pass { background-color: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; }
    .summary.some-fail { background-color: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
    .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ff8080; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h1>🧪 Test Runner - Vibe Learning Companion</h1>
  <p>Halaman ini menjalankan unit test untuk logika aplikasi secara otomatis.</p>

  <div id="error-display" style="display:none;" class="error-box"></div>

  <div class="test-suite">
    <h2>Habit Tracker Tests</h2>
    <div id="test-results">Running tests...</div>
    
    <h2 style="margin-top:2rem">Pomodoro Tests</h2>
    <div id="pomodoro-test-results">Running tests...</div>
    
    <h2 style="margin-top:2rem">Telegram Bot Tests</h2>
    <div id="telegram-test-results">Running tests...</div>
  </div>

  <div id="test-summary" class="summary"></div>

  <!-- Mock DOM elements for test environment -->
  <div style="display:none;">
    <form id="habit-form"><input id="habit-input"></form>
    <ul id="habit-list"></ul>
    <div id="habit-progress"><div id="progress-fill"></div><span id="progress-text"></span></div>
    <p id="empty-message"></p>
    
    <!-- Mock elements for Pomodoro -->
    <div id="pomodoro-display"></div>
    <button id="pomodoro-start"></button>
    <button id="pomodoro-pause"></button>
    <button id="pomodoro-reset"></button>
    <div id="toast-container"></div>
    
    <!-- Mock elements for Telegram -->
    <input id="telegram-token">
    <input id="telegram-chat-id">
    <textarea id="telegram-message"></textarea>
    <div id="telegram-status"></div>
    <button id="save-telegram-config"></button>
    <button id="clear-telegram-config"></button>
    <button id="send-telegram-message"></button>
    <button id="send-telegram-report"></button>
    <button id="sync-telegram-commands"></button>
  </div>

  <script>
    // Global error handler to capture loading errors
    window.onerror = function(message, source, lineno, colno, error) {
      const display = document.getElementById('error-display');
      display.style.display = 'block';
      display.innerHTML = `<strong>Error Terdeteksi:</strong>\n${message}\ndi ${source} (Baris ${lineno}:${colno})`;
      document.getElementById('test-results').innerHTML = '<span class="fail">Pengujian terhenti karena error.</span>';
      return false;
    };
  </script>
  
  <script src="script.js"></script>
  
  <script>
    // Mock LocalStorage if disabled/restricted on file://
    const mockStorage = {};
    const safeLocalStorage = {
      getItem: (key) => {
        try { return localStorage.getItem(key); } 
        catch(e) { return mockStorage[key] || null; }
      },
      setItem: (key, val) => {
        try { localStorage.setItem(key, val); } 
        catch(e) { mockStorage[key] = String(val); }
      },
      clear: () => {
        try { localStorage.clear(); } 
        catch(e) { for (let k in mockStorage) delete mockStorage[k]; }
      }
    };

    // Override localstorage functions in script.js context
    const originalSave = saveHabits;
    const originalLoad = loadHabits;

    saveHabits = function() {
      safeLocalStorage.setItem('vibe_habits', JSON.stringify(habits));
      updateProgress();
    };

    loadHabits = function() {
      const savedData = safeLocalStorage.getItem('vibe_habits');
      if (savedData) {
        try { habits = JSON.parse(savedData); } catch (e) { habits = []; }
      } else {
        habits = [];
      }
      renderHabits();
    };

    // ===== MINI TESTING FRAMEWORK =====
    const resultsContainer = document.getElementById('test-results');
    const summaryContainer = document.getElementById('test-summary');
    let totalTests = 0;
    let passedTests = 0;
    const testCasesOutput = [];
    const pomodoroTestCasesOutput = [];
    const telegramTestCasesOutput = [];

    function assert(condition, message) {
      totalTests++;
      if (condition) {
        passedTests++;
        testCasesOutput.push(`<div class="test-case"><span>✓ ${message}</span><span class="pass">PASSED</span></div>`);
      } else {
        testCasesOutput.push(`<div class="test-case"><span>✗ ${message}</span><span class="fail">FAILED</span></div>`);
      }
    }
    
    function assertPomodoro(condition, message) {
      totalTests++;
      if (condition) {
        passedTests++;
        pomodoroTestCasesOutput.push(`<div class="test-case"><span>✓ ${message}</span><span class="pass">PASSED</span></div>`);
      } else {
        pomodoroTestCasesOutput.push(`<div class="test-case"><span>✗ ${message}</span><span class="fail">FAILED</span></div>`);
      }
    }
    
    function assertTelegram(condition, message) {
      totalTests++;
      if (condition) {
        passedTests++;
        telegramTestCasesOutput.push(`<div class="test-case"><span>✓ ${message}</span><span class="pass">PASSED</span></div>`);
      } else {
        telegramTestCasesOutput.push(`<div class="test-case"><span>✗ ${message}</span><span class="fail">FAILED</span></div>`);
      }
    }

    // Reset state before each test
    function beforeEach() {
      habits = [];
      habitIdCounter = Date.now();
      safeLocalStorage.clear();
      
      // Reset Pomodoro
      resetPomodoro();
      
      // Clear Telegram Mock UI values
      if (telegramTokenInput) telegramTokenInput.value = '';
      if (telegramChatIdInput) telegramChatIdInput.value = '';
      if (telegramMessageInput) telegramMessageInput.value = '';
    }

    // ===== TEST SUITE =====
    function runTests() {
      try {
        // Test 1: Add Habit
        beforeEach();
        addHabit("Test Belajar Vibe Coding 💻");
        assert(habits.length === 1, "Harus bisa menambah habit baru");
        assert(habits[0].name === "Test Belajar Vibe Coding 💻", "Nama habit harus sesuai");
        assert(habits[0].done === false, "Status awal habit baru harus false");

        // Test 2: Toggle Habit (Done / Undone)
        beforeEach();
        addHabit("Test Habit 2");
        const habitId = habits[0].id;
        toggleHabit(habitId);
        assert(habits[0].done === true, "Status habit harus berubah jadi true setelah di-toggle");
        toggleHabit(habitId);
        assert(habits[0].done === false, "Status habit harus kembali jadi false jika di-toggle lagi");

        // Test 3: Delete Habit
        beforeEach();
        addHabit("Test Habit A");
        addHabit("Test Habit B");
        const idToDelete = habits[0].id;
        deleteHabit(idToDelete);
        assert(habits.length === 1, "Jumlah habit berkurang setelah dihapus");
        assert(habits[0].name === "Test Habit B", "Habit yang tersisa harus benar");

        // Test 4: LocalStorage Persistence
        beforeEach();
        addHabit("Test Simpan");
        const loaded = JSON.parse(safeLocalStorage.getItem('vibe_habits'));
        assert(loaded !== null, "Data harus tersimpan");
        assert(loaded[0].name === "Test Simpan", "Data di storage harus sesuai");
        
        // ==== POMODORO TESTS ====
        
        // Test P1: Initial State
        beforeEach();
        assertPomodoro(pomodoroSecondsLeft === 25 * 60, "Timer dimulai pada 25 menit (1500 detik)");
        assertPomodoro(pomodoroIsRunning === false, "Timer tidak berjalan di awal");
        assertPomodoro(pomodoroIsBreak === false, "Fase awal adalah fokus, bukan break");
        assertPomodoro(formatTime(25 * 60) === "25:00", "Format waktu sesuai MM:SS");
        
        // Test P2: Start and Pause
        beforeEach();
        startPomodoro();
        assertPomodoro(pomodoroIsRunning === true, "Timer berstatus isRunning saat dimulai");
        assertPomodoro(pomodoroInterval !== null, "Interval diset saat dimulai");
        
        pausePomodoro();
        assertPomodoro(pomodoroIsRunning === false, "Timer berstatus berhenti (false) saat dipause");
        
        // Test P3: Reset Timer
        beforeEach();
        pomodoroSecondsLeft = 100;
        pomodoroIsBreak = true;
        resetPomodoro();
        assertPomodoro(pomodoroSecondsLeft === 25 * 60, "Waktu kembali ke 25 menit setelah direset");
        assertPomodoro(pomodoroIsBreak === false, "Fase kembali ke fokus setelah direset");
        assertPomodoro(pomodoroIsRunning === false, "Timer harus berhenti setelah direset");

        // Test P4: Toast Notification
        const toastContainer = document.getElementById('toast-container');
        toastContainer.innerHTML = '';
        showToast('Test toast muncul');
        assertPomodoro(toastContainer.children.length === 1, "Toast muncul saat showToast dipanggil");
        assertPomodoro(toastContainer.children[0].textContent === 'Test toast muncul', "Isi toast sesuai pesan");
        
        // ==== TELEGRAM TESTS ====
        
        // Test T1: Validate Token Format
        assertTelegram(validateTelegramToken("123456789:ABCdefGhIJKlmnOPqrsTUVwxyz123456789") === true, "Token valid format harus true");
        assertTelegram(validateTelegramToken("invalid_token_format") === false, "Token format salah harus false");
        assertTelegram(validateTelegramToken("12345:Short") === false, "Token terlalu pendek harus false");
        
        // Test T2: Validate Chat ID Format
        assertTelegram(validateChatId("123456789") === true, "Chat ID positif (Personal) valid");
        assertTelegram(validateChatId("-1001987654321") === true, "Chat ID negatif (Group/Supergroup) valid");
        assertTelegram(validateChatId("abc1234") === false, "Chat ID mengandung huruf tidak valid");
        
        // Test T3: Save Config
        beforeEach();
        telegramTokenInput.value = "123456789:ABCdefGhIJKlmnOPqrsTUVwxyz123456789";
        telegramChatIdInput.value = "-100123456";
        const isSaved = saveTelegramConfig();
        
        assertTelegram(isSaved === true, "Simpan config valid menghasilkan true");
        assertTelegram(safeLocalStorage.getItem('vibe_telegram_token') === "123456789:ABCdefGhIJKlmnOPqrsTUVwxyz123456789", "Token tersimpan di storage");
        assertTelegram(safeLocalStorage.getItem('vibe_telegram_chat_id') === "-100123456", "Chat ID tersimpan di storage");
        
        // Test T4: Build Daily Report Message
        beforeEach();
        addHabit("Habit 1");
        addHabit("Habit 2");
        toggleHabit(habits[0].id); // Selesaikan 1 habit
        pomodoroSessionsCompleted = 3; // Mock pomodoro selesai 3 sesi
        
        const report = buildDailyReportMessage();
        assertTelegram(report.includes("1 / 2 selesai"), "Laporan harian mencatat habit dengan akurat");
        assertTelegram(report.includes("3"), "Laporan harian mencatat sesi pomodoro dengan akurat");

        // Test T5: Parse Telegram Commands
        assertTelegram(parseTelegramCommand('/add Baca docs').type === 'add', "Command /add dikenali");
        assertTelegram(parseTelegramCommand('/add Baca docs').habitName === 'Baca docs', "Command /add mengambil nama habit");
        assertTelegram(parseTelegramCommand('/done Baca docs').type === 'done', "Command /done dikenali");
        assertTelegram(parseTelegramCommand('/list').type === 'list', "Command /list dikenali");
        assertTelegram(parseTelegramCommand('halo biasa').type === 'ignore', "Pesan biasa diabaikan");

        // Test T6: Prevent duplicate habit names
        beforeEach();
        addHabit('Baca docs');
        const duplicateResult = addHabit('baca docs');
        assertTelegram(duplicateResult === false, "Habit duplikat ditolak");
        assertTelegram(habits.length === 1, "Habit duplikat tidak menambah item baru");

        // Test T7: Build Habit List Message
        toggleHabit(habits[0].id);
        const listMessage = buildHabitListMessage();
        assertTelegram(listMessage.includes('✅ Baca docs'), "Habit list menampilkan status selesai");

        // Test T8: Process /done Command
        beforeEach();
        addHabit('Belajar Sync');
        
        // Verifikasi findHabitByName bekerja dengan benar
        const foundHabit = findHabitByName('Belajar Sync');
        assertTelegram(foundHabit !== undefined, "Habit harus dapat ditemukan berdasarkan nama");
        assertTelegram(foundHabit.name === 'Belajar Sync', "Nama habit yang ditemukan harus sesuai");

        // Render Results
        resultsContainer.innerHTML = testCasesOutput.join('');
        document.getElementById('pomodoro-test-results').innerHTML = pomodoroTestCasesOutput.join('');
        document.getElementById('telegram-test-results').innerHTML = telegramTestCasesOutput.join('');
        
        if (passedTests === totalTests) {
          summaryContainer.className = "summary all-pass";
          summaryContainer.innerHTML = `Semua test berhasil! 🎉 (${passedTests}/${totalTests} Passed)`;
        } else {
          summaryContainer.className = "summary some-fail";
          summaryContainer.innerHTML = `Beberapa test gagal! ❌ (${passedTests}/${totalTests} Passed)`;
        }
      } catch (err) {
        window.onerror(err.message, "test.html", 0, 0, err);
      }
    }

    // Run tests on load
    window.addEventListener('load', runTests);
  </script>
</body>
</html>
